version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: fifa_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fifa_db
      MYSQL_USER: fifa_user
      MYSQL_PASSWORD: fifa_pass
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
